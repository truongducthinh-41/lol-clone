name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Robot sẽ chạy mỗi khi bạn push code lên nhánh main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Thư mục chứa web sau khi build của Vite
          branch: gh-pages # Nhánh dùng để hiển thị web